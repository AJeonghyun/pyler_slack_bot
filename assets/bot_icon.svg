<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D5DF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1E3A8A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- ballot box -->
  <g filter="url(#shadow)">
    <!-- box body -->
    <rect x="118" y="250" width="276" height="168" rx="26" fill="#FFFFFF"/>
    <!-- box lid with slot -->
    <rect x="104" y="214" width="304" height="60" rx="20" fill="#E8EEFF"/>
    <rect x="216" y="236" width="80" height="16" rx="8" fill="#3B82F6"/>
  </g>

  <!-- ballot paper going into the slot -->
  <g transform="rotate(-10 256 150)">
    <rect x="186" y="70" width="140" height="150" rx="16" fill="#FFFFFF"/>
    <!-- check mark on the ballot -->
    <path d="M214 150 l24 26 l46 -60"
          fill="none" stroke="#22C55E" stroke-width="22"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- star accents -->
  <g fill="#FBBF24">
    <path d="M408 96 l9 19 21 3 -15 15 4 21 -19 -10 -19 10 4 -21 -15 -15 21 -3 z"/>
  </g>
  <circle cx="92" cy="150" r="12" fill="#FBBF24" opacity="0.9"/>
  <circle cx="430" cy="300" r="10" fill="#FFFFFF" opacity="0.6"/>
</svg>
